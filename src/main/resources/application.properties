spring.application.name=horserace

# ---- Database connection ----
spring.datasource.url=jdbc:postgresql://localhost:5432/horserace_db
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- DB-first schema management ----
# schema_v2.sql is the source of truth. Spring runs it on startup (it begins with
# DROP TABLE ... CASCADE, so it is safe to re-run), then Hibernate VALIDATES that the
# entities match the tables. Hibernate never edits the schema itself.
spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema_v2.sql
spring.sql.init.data-locations=classpath:db/seed.sql

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# NOTE: with the settings above the schema (and seed) are re-applied on EVERY startup,
# which wipes existing data — ideal for development. To keep data across restarts after
# the first run, set: spring.sql.init.mode=never

# ---- JWT / Auth ----
# DEV secret only (Base64, >=256 bits). Override in prod via env var APP_JWT_SECRET.
app.jwt.secret=tNYmKBqqEc3M0dWAHi6wfs0MUlqDJtoYVutdZYi6wtQ
app.jwt.issuer=horserace
# access-token lifetime = 15 minutes
app.jwt.access-token-ttl-ms=900000
# refresh-token lifetime = 7 days
app.jwt.refresh-token-ttl-ms=604800000

# ---- Google Sign-In ----
# OAuth 2.0 Web Client ID from Google Cloud Console. The frontend obtains a Google ID token
# and posts it to /api/v1/auth/google; the backend verifies its audience equals this value.
app.google.client-id=${APP_GOOGLE_CLIENT_ID:your-google-web-client-id.apps.googleusercontent.com}

# ---- OpenAPI / Swagger UI ----
# UI:  http://localhost:8080/swagger-ui.html
# JSON: http://localhost:8080/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.api-docs.path=/v3/api-docs

# ---- Email / SMTP (Password Reset) ----
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${APP_MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${APP_MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Password reset settings
app.password-reset.code-ttl-minutes=15
app.password-reset.cooldown-seconds=60
